<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilario Lanches - Pedido</title>
  <link rel="stylesheet" href="pedido-app.css">
</head>
<body>

<div class="card">
  <h1>🍔 Ilario Lanches</h1>
  <p class="sub">Novo pedido</p>

  <label>Tipo do pedido</label>
  <div class="tipo-pedido">
    <input type="radio" name="tipoPedido" id="tipoEntrega" value="entrega" checked>
    <label class="tipo-option" for="tipoEntrega">Entrega</label>
    <input type="radio" name="tipoPedido" id="tipoRetirada" value="retirada">
    <label class="tipo-option" for="tipoRetirada">Retirada no Local</label>
  </div>

  <label>Nome do cliente</label>
  <input id="nome" type="text" placeholder="Ex: João Silva">

  <div id="blocoEndereco">
    <label>Endereço</label>
    <textarea id="endereco" placeholder="Rua, número, bairro..."></textarea>
  </div>

  <label>Telefone</label>
  <input id="telefone" type="tel" placeholder="(41) 9XXXX-XXXX">

  <label>Pedido</label>
  <textarea id="pedido" placeholder="Ex: 2x X-Bacon, 1x Coca 600ml..."></textarea>

  <div id="blocoTaxaEntrega">
    <label>Taxa de entrega (R$)</label>
    <input id="taxaEntrega" type="number" step="0.01" placeholder="0,00">
  </div>

  <div class="row">
    <div>
      <label>Valor (R$)</label>
      <input id="valor" type="number" step="0.01" placeholder="0,00">
    </div>
    <div>
      <label>Pagamento</label>
      <select id="pagamento">
        <option value="PAGO - OK">PAGO - OK</option>
        <option value="COBRAR NO CARTÃO">COBRAR NO CARTÃO</option>
        <option value="DINHEIRO">DINHEIRO</option>
      </select>
    </div>
  </div>

  <div id="blocoTroco" class="hidden">
    <label>Precisa de troco?</label>
    <select id="precisaTroco">
      <option value="Não">Não</option>
      <option value="Sim">Sim</option>
    </select>

    <div id="blocoTrocoValor" class="hidden">
      <label>Troco para quanto?</label>
      <input id="trocoPara" type="number" step="0.01" placeholder="Ex: 50,00">
    </div>
  </div>

  <button id="btnSalvar">Salvar Pedido</button>
  <div class="msg" id="msg"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="pedido-pdf.js"></script>
<script src="pedido-app.js"></script>

</body>
</html>
